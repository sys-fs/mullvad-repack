name: Patch Mullvad VPN package

on:
  push:
    branches:
      - 6-create-package-repository

jobs:
  patch-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install patch

      - name: Build packages
        run: |
          ./repack.sh 2026.1 sysvinit
          ./repack.sh 2026.1 openrc
          ./repack.sh 2026.1 runit
